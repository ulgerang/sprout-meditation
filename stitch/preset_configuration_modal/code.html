<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Preset Configuration Modal</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;family=Noto+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8ba79c",
                        "secondary": "#a2b8af",
                        "background-light": "#f4f3f1",
                        "background-dark": "#181a19",
                        "surface-light": "#ffffff",
                        "surface-dark": "#232624",
                        "text-main": "#343A40",
                        "text-muted": "#6d7874",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px"},
                    boxShadow: {
                        "soft": "0px 4px 20px rgba(52, 58, 64, 0.05)",
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-800 flex justify-center items-center min-h-screen font-display">
<!-- Mockup of the underlying app screen to show context -->
<div class="relative w-full max-w-md h-[844px] overflow-hidden bg-background-light dark:bg-background-dark shadow-2xl rounded-[40px] border-[8px] border-gray-900 group/design-root">
<!-- Blurred Background Content -->
<div class="absolute inset-0 p-6 flex flex-col items-center justify-center opacity-30 pointer-events-none blur-[2px]">
<div class="w-48 h-48 rounded-full border-4 border-primary/30 flex items-center justify-center mb-12">
<span class="text-4xl text-text-main dark:text-white font-light">20:00</span>
</div>
<div class="w-full max-w-xs h-12 bg-primary/20 rounded-xl mb-4"></div>
<div class="w-full max-w-xs h-12 bg-primary/20 rounded-xl mb-4"></div>
</div>
<!-- Modal Overlay -->
<div class="absolute inset-0 bg-black/40 backdrop-blur-sm z-10 flex flex-col justify-end">
<!-- Modal Content -->
<div class="w-full bg-[#f4f3f1] dark:bg-[#1e201f] rounded-t-[32px] shadow-soft pb-8 flex flex-col max-h-[90%] overflow-y-auto relative animate-slide-up">
<!-- Bottom Sheet Handle -->
<div class="flex flex-col items-center pt-4 pb-2 sticky top-0 bg-[#f4f3f1] dark:bg-[#1e201f] z-20 rounded-t-[32px]">
<div class="h-1.5 w-12 rounded-full bg-[#dadddc] dark:bg-neutral-600 mb-4"></div>
<h4 class="text-text-muted dark:text-neutral-400 text-sm font-bold tracking-wider uppercase">Edit Preset</h4>
</div>
<!-- Scrollable Content Area -->
<div class="flex-1 px-6 space-y-8">
<!-- Duration Section -->
<section class="flex flex-col items-center pt-2">
<!-- Headline -->
<h1 class="text-text-main dark:text-neutral-200 text-[32px] font-bold leading-tight text-center mb-6">Duration</h1>
<!-- Custom Wheel Picker -->
<div class="relative w-full h-48 flex items-center justify-center overflow-hidden mask-gradient">
<!-- Selection Highlight Bar -->
<div class="absolute w-full h-14 bg-primary/15 dark:bg-primary/20 rounded-xl z-0 pointer-events-none border border-primary/30"></div>
<div class="flex w-full justify-center z-10 gap-2">
<!-- Minutes Column -->
<div class="flex-1 flex flex-col items-end pr-4 relative h-48 overflow-hidden mask-vertical">
<div class="py-1 opacity-20 text-text-muted text-2xl font-medium text-center w-full">05</div>
<div class="py-1 opacity-40 text-text-muted text-2xl font-medium text-center w-full">10</div>
<div class="py-2 text-text-main dark:text-white text-4xl font-bold text-center w-full scale-110 origin-center transition-transform">15</div>
<div class="py-1 opacity-40 text-text-muted text-2xl font-medium text-center w-full">20</div>
<div class="py-1 opacity-20 text-text-muted text-2xl font-medium text-center w-full">25</div>
</div>
<span class="text-primary font-bold text-xl self-center pb-1">:</span>
<!-- Seconds Column -->
<div class="flex-1 flex flex-col items-start pl-4 relative h-48 overflow-hidden mask-vertical">
<div class="py-1 opacity-20 text-text-muted text-2xl font-medium text-center w-full">45</div>
<div class="py-1 opacity-40 text-text-muted text-2xl font-medium text-center w-full">50</div>
<div class="py-2 text-text-main dark:text-white text-4xl font-bold text-center w-full scale-110 origin-center transition-transform">00</div>
<div class="py-1 opacity-40 text-text-muted text-2xl font-medium text-center w-full">10</div>
<div class="py-1 opacity-20 text-text-muted text-2xl font-medium text-center w-full">15</div>
</div>
</div>
<!-- Labels Overlay -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none gap-24">
<span class="text-xs font-bold uppercase tracking-widest text-primary translate-y-10 -translate-x-8">min</span>
<span class="text-xs font-bold uppercase tracking-widest text-primary translate-y-10 translate-x-8">sec</span>
</div>
</div>
</section>
<div class="h-px w-full bg-neutral-200 dark:bg-neutral-700"></div>
<!-- Preparation Section -->
<section class="space-y-4">
<div class="flex justify-between items-center px-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">self_improvement</span>
<h3 class="text-text-main dark:text-neutral-200 font-bold text-lg">Preparation</h3>
</div>
<span class="text-sm text-primary font-semibold bg-primary/10 px-2 py-1 rounded-md">10s</span>
</div>
<div class="bg-white dark:bg-surface-dark p-1.5 rounded-2xl shadow-sm border border-neutral-100 dark:border-neutral-700 flex justify-between relative isolate">
<!-- Toggle Options -->
<button class="flex-1 py-3 rounded-xl text-sm font-medium text-text-muted hover:text-text-main dark:text-neutral-400 transition-colors z-10 relative">None</button>
<button class="flex-1 py-3 rounded-xl text-sm font-bold text-white shadow-sm bg-primary z-10 relative">10s</button>
<button class="flex-1 py-3 rounded-xl text-sm font-medium text-text-muted hover:text-text-main dark:text-neutral-400 transition-colors z-10 relative">20s</button>
<button class="flex-1 py-3 rounded-xl text-sm font-medium text-text-muted hover:text-text-main dark:text-neutral-400 transition-colors z-10 relative">30s</button>
</div>
</section>
<!-- Audio Section -->
<section class="space-y-4">
<div class="flex justify-between items-center px-1">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">notifications_active</span>
<h3 class="text-text-main dark:text-neutral-200 font-bold text-lg">Bell Sound</h3>
</div>
</div>
<!-- Horizontal Audio Scroll -->
<div class="flex gap-3 overflow-x-auto pb-2 -mx-6 px-6 scrollbar-hide">
<!-- Option 1: Selected -->
<button class="group flex-shrink-0 flex flex-col items-center gap-3 w-28 p-3 rounded-2xl bg-white dark:bg-surface-dark border-2 border-primary ring-2 ring-primary/20 transition-all">
<div class="w-12 h-12 rounded-full bg-primary flex items-center justify-center text-white shadow-md">
<span class="material-symbols-outlined">waves</span>
</div>
<span class="text-sm font-bold text-text-main dark:text-white">Tibetan</span>
</button>
<!-- Option 2 -->
<button class="group flex-shrink-0 flex flex-col items-center gap-3 w-28 p-3 rounded-2xl bg-neutral-100 dark:bg-neutral-800 border-2 border-transparent hover:bg-white dark:hover:bg-surface-dark hover:border-neutral-200 transition-all">
<div class="w-12 h-12 rounded-full bg-neutral-200 dark:bg-neutral-700 flex items-center justify-center text-text-muted group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">circle_notifications</span>
</div>
<span class="text-sm font-medium text-text-muted dark:text-neutral-400">Gong</span>
</button>
<!-- Option 3 -->
<button class="group flex-shrink-0 flex flex-col items-center gap-3 w-28 p-3 rounded-2xl bg-neutral-100 dark:bg-neutral-800 border-2 border-transparent hover:bg-white dark:hover:bg-surface-dark hover:border-neutral-200 transition-all">
<div class="w-12 h-12 rounded-full bg-neutral-200 dark:bg-neutral-700 flex items-center justify-center text-text-muted group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">forest</span>
</div>
<span class="text-sm font-medium text-text-muted dark:text-neutral-400">Nature</span>
</button>
<!-- Option 4 -->
<button class="group flex-shrink-0 flex flex-col items-center gap-3 w-28 p-3 rounded-2xl bg-neutral-100 dark:bg-neutral-800 border-2 border-transparent hover:bg-white dark:hover:bg-surface-dark hover:border-neutral-200 transition-all">
<div class="w-12 h-12 rounded-full bg-neutral-200 dark:bg-neutral-700 flex items-center justify-center text-text-muted group-hover:text-primary transition-colors">
<span class="material-symbols-outlined">do_not_disturb_on</span>
</div>
<span class="text-sm font-medium text-text-muted dark:text-neutral-400">Silence</span>
</button>
</div>
</section>
</div>
<!-- Footer / Action Bar -->
<div class="sticky bottom-0 bg-[#f4f3f1] dark:bg-[#1e201f] pt-4 pb-8 px-6 mt-4 border-t border-transparent z-20">
<div class="flex gap-4">
<button class="flex-1 h-14 rounded-xl flex items-center justify-center text-text-muted dark:text-neutral-400 font-bold hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors">
                            Cancel
                        </button>
<button class="flex-[2] h-14 rounded-xl bg-primary hover:bg-[#7a968b] text-white font-bold text-lg shadow-lg shadow-primary/20 flex items-center justify-center gap-2 transition-transform active:scale-95">
<span class="material-symbols-outlined">check</span>
                            Save Changes
                        </button>
</div>
</div>
</div>
</div>
</div>
<style>
        .mask-vertical {
            mask-image: linear-gradient(to bottom, transparent 0%, black 40%, black 60%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 40%, black 60%, transparent 100%);
        }
        
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</body></html>
